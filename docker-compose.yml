# opencore Gateway - 24/7 deployment on a server/VPS.
#
# Usage:
#   1. Create a .env file next to this compose file with your secrets:
#        TELEGRAM_BOT_TOKEN=...        # from @BotFather
#        opencore_MODEL=anthropic/claude-...   # provider/model id
#        ANTHROPIC_API_KEY=...         # whatever provider key your model needs
#   2. docker compose up -d
#      (add --profile embeddings to also run local semantic search)
#   3. docker compose logs -f         # find the pairing code, /pair in Telegram
#
# The gateway reaches Telegram via outbound polling, so no inbound ports are
# published. The opencode server stays internal to the container.

services:
  opencore-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: opencore-gateway:latest
    container_name: opencore-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Default agent for remote use. 'chat' = no shell (safe default).
      # Set to 'dev' only if you accept remote code execution in the container.
      opencore_GATEWAY_DEFAULT_AGENT: ${opencore_GATEWAY_DEFAULT_AGENT:-chat}
      opencore_GATEWAY_WORKDIR: /work
      # Semantic search via the embeddings service below (when enabled).
      # Leave unset to fall back to keyword-only (BM25).
      opencore_EMBED_BASE_URL: ${opencore_EMBED_BASE_URL-http://embeddings:8181/v1}
      opencore_EMBED_MODEL: ${opencore_EMBED_MODEL:-harrier}
    volumes:
      # Persist opencore state (long-term memory, gateway allowlist/pairing).
      - opencore-state:/home/opencore/.opencore
      # Optional: mount a project for the agent to work on.
      # - ./my-project:/work
    # No ports exposed: Telegram is reached via outbound long-polling.

  # Local embeddings for semantic search (harrier-oss-v1 via llama.cpp).
  # Started only with: docker compose --profile embeddings up -d
  # Omit the profile to run keyword-only (no embeddings container).
  embeddings:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: opencore-embeddings
    restart: unless-stopped
    profiles: ["embeddings"]
    command: >
      -hf SuperPauly/harrier-oss-v1-0.6b-gguf:Q8_0
      --embedding --port 8181 --host 0.0.0.0
    volumes:
      - llama-models:/root/.cache/llama.cpp
    # Internal only; reached by the gateway at http://embeddings:8181

volumes:
  opencore-state:
  llama-models:
